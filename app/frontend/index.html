<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TEO.AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black:      #0a0a0a;
      --surface:    #111111;
      --border:     #222222;
      --dim-white:  #c8c8c8;
      --muted:      #555555;
      --yellow:     #f5c400;
      --yellow-dim: #a38200;
      --font:       'JetBrains Mono', 'Courier New', monospace;
    }

    body {
      background: var(--black);
      color: var(--dim-white);
      font-family: var(--font);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo-bar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .barcode {
      display: flex;
      gap: 2px;
      align-items: flex-end;
      height: 28px;
    }

    .barcode span {
      background: var(--dim-white);
      width: 2px;
      display: block;
    }

    .barcode .slash {
      position: absolute;
      width: 2px;
      height: 28px;
      background: var(--yellow);
      transform: rotate(12deg);
    }

    .barcode-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .wordmark {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--dim-white);
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      color: var(--yellow);
      letter-spacing: 2px;
      border: 1px solid var(--yellow);
      padding: 1px 5px;
    }

    .tagline {
      margin-left: auto;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
    }

    /* ── Chat Window ── */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .message {
      max-width: 72%;
      line-height: 1.6;
      font-size: 13px;
    }

    .message.user {
      align-self: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 14px;
    }

    .message.teo {
      align-self: flex-start;
      border-left: 2px solid var(--yellow);
      padding: 10px 14px;
      color: var(--dim-white);
    }

    .message .sender {
      font-size: 10px;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .message.user .sender { color: var(--muted); }
    .message.teo  .sender { color: var(--yellow); }

    /* ── Input Bar ── */
    #input-bar {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: var(--surface);
      color: var(--dim-white);
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: 13px;
      padding: 16px 20px;
      resize: none;
      height: 56px;
      line-height: 1.4;
    }

    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--yellow);
      color: var(--black);
      border: none;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 0 28px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #send-btn:hover    { background: #ffd700; }
    #send-btn:disabled { background: var(--yellow-dim); cursor: not-allowed; }

    /* ── Thinking indicator ── */
    .thinking {
      align-self: flex-start;
      border-left: 2px solid var(--yellow);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--muted);
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-bar">
    <div class="barcode-wrap">
      <div class="barcode">
        <span style="height:28px"></span>
        <span style="height:20px"></span>
        <span style="height:26px"></span>
        <span style="height:16px"></span>
        <span style="height:28px"></span>
        <span style="height:22px"></span>
        <span style="height:18px"></span>
        <span style="height:28px"></span>
        <span style="height:14px"></span>
        <span style="height:24px"></span>
        <span style="height:28px"></span>
        <span style="height:20px"></span>
      </div>
      <div class="slash"></div>
    </div>
    <span class="wordmark">TEO</span>
    <span class="badge">.AI</span>
  </div>
  <span class="tagline">DEPLOY. DEFEND. EVOLVE.</span>
</header>

<div id="chat-window"></div>

<div id="input-bar">
  <textarea
    id="user-input"
    placeholder="Talk to Teo..."
    rows="1"
  ></textarea>
  <button id="send-btn">SEND</button>
</div>

<script>
  const chatWindow = document.getElementById('chat-window');
  const userInput  = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');

  const API_URL = '/api/chat';

  function appendMessage(sender, text) {
    const div = document.createElement('div');
    div.className = `message ${sender}`;

    const label = document.createElement('div');
    label.className = 'sender';
    label.textContent = sender === 'user' ? 'YOU' : 'TEO';

    const body = document.createElement('div');
    body.textContent = text;

    div.appendChild(label);
    div.appendChild(body);
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return div;
  }

  function showThinking() {
    const div = document.createElement('div');
    div.className = 'thinking';
    div.id = 'thinking';
    div.textContent = 'TEO IS THINKING...';
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeThinking() {
    const el = document.getElementById('thinking');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    userInput.value = '';
    sendBtn.disabled = true;

    appendMessage('user', text);
    showThinking();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: [] })
      });

      removeThinking();

      if (!res.ok) {
        appendMessage('teo', `[server error ${res.status} — check if uvicorn is running]`);
        sendBtn.disabled = false;
        userInput.focus();
        return;
      }

      const data = await res.json();
      appendMessage('teo', data.response);

    } catch (err) {
      removeThinking();
      appendMessage('teo', '.!.');
    }

    sendBtn.disabled = false;
    userInput.focus();
  }

  sendBtn.addEventListener('click', sendMessage);

  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>

</body>
</html>
